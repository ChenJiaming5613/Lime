<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Rotating Cube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      text-align: center;
      display: none;
    }
    #stats {
      position: absolute;
      top: 8px;
      right: 8px;
      color: #00ff00;
      font-family: monospace;
      font-size: 0.85rem;
      line-height: 1.4;
      white-space: pre;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="error"></div>
  <div id="stats"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
