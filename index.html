<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Hello Triangle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
    }
    h1 { margin-bottom: 16px; font-size: 1.5rem; }
    canvas {
      border: 1px solid #444;
      border-radius: 8px;
      width: 512px;
      height: 512px;
      max-width: 90vw;
    }
    #error {
      color: #ff6b6b;
      margin-top: 16px;
      display: none;
    }
    #info {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>WebGPU - Hello Triangle</h1>
  <canvas id="canvas" width="512" height="512"></canvas>
  <div id="error"></div>
  <div id="info">请使用支持 WebGPU 的浏览器（Chrome 113+ / Edge 113+ / Firefox Nightly 等）</div>

  <script type="module" src="./main.js"></script>
</body>
</html>
